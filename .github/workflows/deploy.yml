name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  WORKER_IMAGE: ghcr.io/${{ github.repository }}-worker

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        id: meta
        run: |
          IMAGE_LC="$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')"
          WORKER_LC="$(echo "${WORKER_IMAGE}" | tr '[:upper:]' '[:lower:]')"
          echo "image_lc=${IMAGE_LC}" >> "$GITHUB_OUTPUT"
          echo "worker_lc=${WORKER_LC}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_lc }}:latest
            ${{ steps.meta.outputs.image_lc }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'https://housetour.example.com' }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_lc }}:latest
            ${{ steps.meta.outputs.worker_lc }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Roll VPS containers
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Require VPS secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS_HOST / VPS_USER / VPS_SSH_KEY not set — image push succeeded; skipping VPS roll."
            echo "skip=1" >> "$GITHUB_ENV"
          else
            echo "skip=0" >> "$GITHUB_ENV"
          fi

      - name: Configure SSH
        if: env.skip != '1'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        if: env.skip != '1'
        env:
          SSH_USER: ${{ secrets.VPS_USER }}
          SSH_HOST: ${{ secrets.VPS_HOST }}
          IMAGE_LC: ghcr.io/${{ github.repository }}
          WORKER_LC: ghcr.io/${{ github.repository }}-worker
          IMAGE_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_LC_LOWER="$(echo "${IMAGE_LC}" | tr '[:upper:]' '[:lower:]')"
          WORKER_LC_LOWER="$(echo "${WORKER_LC}" | tr '[:upper:]' '[:lower:]')"
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash -se <<EOF
          set -euo pipefail
          cd /opt/housetour

          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

          export WEB_IMAGE="${IMAGE_LC_LOWER}:${IMAGE_SHA}"
          export WORKER_IMAGE="${WORKER_LC_LOWER}:${IMAGE_SHA}"
          echo "[deploy] pulling \${WEB_IMAGE} and \${WORKER_IMAGE}"
          docker pull "\${WEB_IMAGE}"
          docker pull "\${WORKER_IMAGE}"

          echo "[deploy] prisma migrate deploy"
          docker run --rm \\
            --network housetour \\
            --env-file /opt/housetour/.env \\
            "\${WEB_IMAGE}" \\
            sh -c 'cd packages/db && node ../../node_modules/prisma/build/index.js migrate deploy || node node_modules/prisma/build/index.js migrate deploy'

          echo "[deploy] rolling web + worker"
          docker compose up -d --no-deps --pull always web worker

          sleep 5
          docker compose ps
          docker logs --tail=40 housetour-web || true
          docker image prune -f --filter "until=72h" || true
          EOF

      - name: Smoke test
        if: env.skip != '1' && vars.SMOKE_URL != ''
        env:
          SMOKE_URL: ${{ vars.SMOKE_URL }}
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$SMOKE_URL" || echo "000")
            echo "attempt $i → $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "307" ] || [ "$CODE" = "308" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed for $SMOKE_URL"
          exit 1
